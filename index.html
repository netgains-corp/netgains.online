<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <!-- Wichtig für responsive Darstellung und Mobile SEO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO: Titel und Beschreibung -->
    <title>Startseite | Die Ultra Website</title>
    <meta name="description" content="Unsere hochoptimierte Plattform. Marktführer in Performance und Ladezeit.">
    
    <!-- Favicon: Firmenlogo als Icon festlegen -->
    <link rel="icon" type="image/webp" href="logo_white.webp">
    
    <!-- LCP Optimierung: Preload für die wichtigsten Elemente im Viewport -->
    <link rel="preload" as="image" href="logo_white.webp" fetchpriority="high">
    <link rel="preload" as="image" href="dancin.webp" fetchpriority="high">

    <!-- Typografie: Hochoptimiertes Laden der professionellen "Inter" Schriftart -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ==========================================
           CSS RESET & BASIS (Minimalistischer Ansatz)
           ========================================== */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em; 
            min-height: 150vh;
        }

        /* ==========================================
           HEADER & NAVIGATION (Glassmorphism)
           ========================================== */
        .site-header {
            position: sticky; 
            top: 0;
            background-color: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            
            width: 100%;
            height: clamp(70px, 9vh, 110px); 
            display: grid;
            grid-template-columns: 1fr auto 1fr; 
            align-items: center;
            padding: 0 5%; 
            z-index: 100; 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .site-header::after {
            content: '';
            position: absolute;
            top: 100%; 
            left: 0;
            width: 100%;
            height: 4px; 
            background: linear-gradient(90deg, #ff007a, #7a00ff, #00e5ff, #00ff7a, #ff007a);
            background-size: 200% 100%;
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
            z-index: -1;
            opacity: 0.6; 
            animation: flowShadow 6s linear infinite;
        }

        @keyframes flowShadow {
            0% { background-position: 200% 0; }
            100% { background-position: 0% 0; }
        }

        .header-nav {
            display: flex;
            gap: clamp(1.2rem, 2.5vw, 3rem);
        }

        .nav-left {
            justify-content: flex-end; 
            padding-right: 4vw;
        }

        .nav-right {
            justify-content: flex-start; 
            padding-left: 4vw;
        }

        .nav-link {
            text-decoration: none;
            color: #555555;
            font-weight: 500; 
            font-size: clamp(0.85rem, 0.9vw, 1rem); 
            text-transform: uppercase; 
            letter-spacing: 0.06em; 
            padding: 0.5rem 0.5rem;
            transition: color 0.2s ease, text-shadow 0.2s ease;
        }

        .nav-link:hover {
            color: #000000; 
            text-shadow: 0 0 12px rgba(0,0,0,0.1); 
        }

        .logo-link {
            display: inline-flex;
            text-decoration: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .logo-link:hover {
            opacity: 0.8; 
            transform: scale(0.98);
        }

        .logo-img {
            width: clamp(160px, 15vw, 240px); 
            height: auto;
            aspect-ratio: 200 / 50;
            object-fit: contain;
            filter: invert(1); 
        }

        @media (max-width: 900px) {
            .site-header {
                grid-template-columns: auto; 
                justify-content: center;
            }
            .header-nav {
                display: none; 
            }
        }

        /* ==========================================
           HERO SECTION 
           ========================================== */
        .hero-section {
            width: 100%;
            padding: clamp(4rem, 12vh, 14rem) 5%;
            display: flex;
            justify-content: center; 
        }

        .hero-container {
            width: 100%;
            max-width: clamp(1000px, 90vw, 1600px); 
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: clamp(3rem, 6vw, 8rem); 
            align-items: center;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .hero-title {
            font-size: clamp(2.8rem, 5.5vw, 6.5rem); 
            font-weight: 700; 
            color: #0a0a0a; 
            line-height: 1.1; 
            margin: 0 0 clamp(1.2rem, 3vh, 2.5rem) 0;
            letter-spacing: -0.03em; 
        }

        .word-rotator {
            display: inline-grid;
            vertical-align: bottom;
        }

        .word-rotator span {
            grid-area: 1 / 1; 
            opacity: 0;
            animation: rotateWords 9s linear infinite; 
            background: linear-gradient(90deg, #0a0a0a, #666666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .word-rotator span:nth-child(1) { animation-delay: 0s; }
        .word-rotator span:nth-child(2) { animation-delay: 3s; }
        .word-rotator span:nth-child(3) { animation-delay: 6s; }

        @keyframes rotateWords {
            0% { opacity: 0; transform: translateY(0.3em); }
            5% { opacity: 1; transform: translateY(0); }
            28% { opacity: 1; transform: translateY(0); }
            33% { opacity: 0; transform: translateY(-0.3em); }
            100% { opacity: 0; transform: translateY(-0.3em); }
        }

        .hero-subtitle {
            font-size: clamp(1.1rem, 1.4vw, 1.6rem); 
            font-weight: 400;
            color: #444444; 
            line-height: 1.6;
            margin: 0 0 clamp(2.5rem, 5vh, 4rem) 0;
            max-width: 90%;
        }

        .hero-cta-wrapper {
            display: flex;
            gap: clamp(1rem, 2vw, 2rem);
        }

        .btn-primary, .btn-secondary {
            text-decoration: none;
            font-weight: 600;
            font-size: clamp(1rem, 1.2vw, 1.3rem);
            padding: clamp(0.9rem, 1.6vh, 1.3rem) clamp(1.8rem, 2.5vw, 3rem);
            border-radius: 4px; 
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .btn-primary {
            background-color: #0a0a0a;
            color: #ffffff;
            border: 1px solid #0a0a0a; 
            box-shadow: 0 10px 25px -8px rgba(10, 10, 10, 0.4);
        }

        .btn-primary:hover {
            background-color: #333333; 
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -10px rgba(10, 10, 10, 0.5);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #0a0a0a;
            border: 1px solid rgba(0, 0, 0, 0.1); 
            box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.05); 
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 1);
            border-color: rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.1);
        }

        /* Container für Bild und Glow-Bubble */
        .hero-image-container {
            position: relative;
            width: 100%;
            z-index: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glow-bubble {
            position: absolute;
            top: 20%;
            left: -15%; 
            width: 70%; 
            aspect-ratio: 1;
            background: rgba(0, 229, 255, 0.45); 
            filter: blur(100px); 
            border-radius: 50%;
            z-index: -1; 
            animation: floatGlow 8s ease-in-out infinite alternate;
            will-change: transform, opacity;
        }

        @keyframes floatGlow {
            0% { transform: scale(1) translate(0, 0); opacity: 0.7; }
            100% { transform: scale(1.15) translate(-30px, 20px); opacity: 1; }
        }

        .hero-image-wrapper {
            width: 100%;
            aspect-ratio: 4 / 3; 
            background-color: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px);
            border-radius: 8px; 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            box-shadow: 0 30px 70px -20px rgba(0, 163, 255, 0.35),
                        inset 0 0 25px rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Sorgt dafür, dass das Bild innerhalb des Radius bleibt */
        }

        .hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Füllt den Glass-Container perfekt aus */
            display: block;
            transition: transform 0.5s ease;
        }

        .hero-image-wrapper:hover .hero-img {
            transform: scale(1.05); /* Dezenter Zoom-Effekt für Interaktivität */
        }

        @media (max-width: 900px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 3.5rem;
            }
            .hero-content {
                align-items: center;
            }
            .hero-subtitle {
                max-width: 100%;
            }
        }

        /* ==========================================
           MAIN CONTENT
           ========================================== */
        .site-main {
            min-height: calc(100vh - clamp(70px, 9vh, 110px)); 
            display: block;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <nav class="header-nav nav-left" aria-label="Hauptnavigation Links">
            <a href="#websites" class="nav-link">Websites</a>
            <a href="#apps" class="nav-link">Apps & Webapps</a>
        </nav>

        <a href="/" class="logo-link" aria-label="Zurück zur Startseite">
            <img 
                src="logo_white.webp" 
                alt="Firmenlogo" 
                class="logo-img" 
                width="200" 
                height="50" 
                fetchpriority="high" 
                decoding="sync"
            >
        </a>

        <nav class="header-nav nav-right" aria-label="Hauptnavigation Rechts">
            <a href="#erfahrungen" class="nav-link">Erfahrungen</a>
            <a href="#about" class="nav-link">Über uns</a>
        </nav>
    </header>

    <main class="site-main">
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-content">
                    <h1 class="hero-title">
                        Websites, Apps und Systeme die<br>
                        <span class="word-rotator">
                            <span>verkaufen.</span>
                            <span>skalieren.</span>
                            <span>wirken.</span>
                        </span>
                    </h1>
                    <p class="hero-subtitle">Maximiere deine Conversion-Raten mit einer Plattform, die in Millisekunden lädt. Perfekte PageSpeed-Scores, kompromissloses Design.</p>
                    <div class="hero-cta-wrapper">
                        <a href="#start" class="btn-primary">Jetzt starten</a>
                        <a href="#portfolio" class="btn-secondary">Projekte ansehen</a>
                    </div>
                </div>

                <div class="hero-image-container">
                    <div class="glow-bubble"></div>
                    <div class="hero-image-wrapper">
                        <!-- Hero Bild mit High-Performance Attributen -->
                        <img 
                            src="dancin.webp" 
                            alt="Visualisierung von dynamischen Systemen" 
                            class="hero-img" 
                            loading="eager" 
                            fetchpriority="high"
                            decoding="async"
                        >
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Ultra Website initialisiert. Hero-Image 'dancin.webp' mit High Performance geladen.");
        });
    </script>

</body>
</html>
